<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    :root { 
      --chrome-tab-bg: #202124; 
      --chrome-toolbar-bg: #35363a; 
      --chrome-border: #1a1b1e; 
      --chrome-icon: #9aa0a6; 
      --chrome-icon-hover: #e8eaed; 
      --chrome-icon-bg-hover: rgba(255,255,255,0.1);
      --chrome-address-bg: #202124; 
      --chrome-address-border: transparent; 
      --chrome-address-focus: #8ab4f8; 
      --chrome-text: #e8eaed; 
    }
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #ffffff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    
    /* Fake Tab Bar */
    #tab-bar { height: 40px; background: var(--chrome-tab-bg); display: flex; align-items: flex-end; padding: 0 8px; border-bottom: 1px solid var(--chrome-border); }
    .tab { background: var(--chrome-toolbar-bg); height: 32px; width: 240px; border-radius: 8px 8px 0 0; display: flex; align-items: center; padding: 0 12px; gap: 8px; position: relative; }
    .tab::before, .tab::after { content: ''; position: absolute; bottom: 0; width: 8px; height: 8px; }
    .tab::before { left: -8px; border-bottom-right-radius: 8px; box-shadow: 4px 4px 0 4px var(--chrome-toolbar-bg); }
    .tab::after { right: -8px; border-bottom-left-radius: 8px; box-shadow: -4px 4px 0 4px var(--chrome-toolbar-bg); }
    .tab-favicon { width: 16px; height: 16px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #000; font-weight: bold; overflow: hidden; }
    .tab-favicon img { width: 100%; height: 100%; }
    .tab-title { color: var(--chrome-text); font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    /* Toolbar */
    #nav { height: 44px; background: var(--chrome-toolbar-bg); display: flex; align-items: center; padding: 0 8px; gap: 4px; border-bottom: 1px solid var(--chrome-border); }
    
    .btn { background: transparent; border: none; color: var(--chrome-icon); cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; padding: 0; }
    .btn:hover { background: var(--chrome-icon-bg-hover); color: var(--chrome-icon-hover); }
    .btn svg { width: 16px; height: 16px; fill: currentColor; }
    
    #address-bar-container { flex: 1; background: var(--chrome-address-bg); border-radius: 20px; height: 28px; display: flex; align-items: center; padding: 0 12px; margin: 0 8px; border: 1px solid var(--chrome-address-border); }
    #address-bar-container:focus-within { border-color: var(--chrome-address-focus); background: #202124; }
    .security-icon { width: 16px; height: 16px; fill: var(--chrome-icon); margin-right: 8px; flex-shrink: 0; }
    #url-input { background: transparent; border: none; color: var(--chrome-text); flex: 1; font-size: 14px; outline: none; width: 100%; letter-spacing: 0.2px; }
    
    #content-area { position: relative; width: 100%; height: calc(100% - 84px); background: #ffffff; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    
    #loader { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: transparent; z-index: 999; }
    #progress { width: 0%; height: 100%; background: var(--chrome-address-focus); transition: width 0.3s ease; }
    
    /* Google-like Home Screen */
    .home { display: flex; flex-direction: column; align-items: center; padding-top: 10vh; height: 100%; background: #ffffff; }
    .home-logo { font-size: 80px; font-weight: 500; letter-spacing: -3px; margin-bottom: 25px; color: #202124; font-family: 'Product Sans', sans-serif;}
    .home-logo span:nth-child(1) { color: #4285f4; }
    .home-logo span:nth-child(2) { color: #ea4335; }
    .home-logo span:nth-child(3) { color: #fbbc05; }
    .home-logo span:nth-child(4) { color: #4285f4; }
    .home-logo span:nth-child(5) { color: #34a853; }
    .home-logo span:nth-child(6) { color: #ea4335; }
    
    .search-box { display: flex; align-items: center; width: 100%; max-width: 584px; border: 1px solid #dfe1e5; padding: 0 14px 0 14px; border-radius: 24px; height: 46px; transition: box-shadow 0.2s; }
    .search-box:hover, .search-box:focus-within { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: rgba(223,225,229,0); }
    .search-icon { width: 20px; height: 20px; fill: #9aa0a6; margin-right: 12px; }
    .search-box input { flex: 1; border: none; outline: none; font-size: 16px; color: #202124; height: 100%; background: transparent; }
    .buttons { margin-top: 30px; display: flex; gap: 12px; }
    .home-btn { background-color: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; padding: 0 16px; line-height: 36px; cursor: pointer; transition: 0.2s; }
    .home-btn:hover { box-shadow: 0 1px 1px rgba(0,0,0,.1); border: 1px solid #dadce0; color: #202124; }
  </style>
</head>
<body>

      <button class="btn" style="opacity:0.5; cursor:default;"><svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></button>

      <button class="btn" onclick="navigate()"><svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
      <button class="btn" onclick="window.top.location.href='<?= proxyUrl ?>'"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
      <div id="address-bar-container">

        <input type="text" id="url-input" value="<?= targetUrl ?>" onkeydown="if(event.key==='Enter') navigate()">
      </div>
      <button class="btn"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
    </div>

    <div id="content-area">
      <div id="loader"><div id="progress"></div></div>
      <iframe id="viewport" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads allow-top-navigation"></iframe>
    </div>

    <!-- Secure Payload Transfer -->
    <script id="b64-payload" type="text/plain"><?!= b64Data ?></script>

    <script>
      const viewport = document.getElementById('viewport');
      const urlInput = document.getElementById('url-input');
      const progress = document.getElementById('progress');
      const tabTitle = document.getElementById('tab-title');
      const favicon = document.getElementById('favicon');
      let currentBlobUrl = null;

      // Extract domain for favicon and title
      try {
        const urlObj = new URL("<?= targetUrl ?>");
        tabTitle.textContent = urlObj.hostname;
        favicon.innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=32">`;
      } catch(e) {}

      function showLoader(show) {
        if (!progress) return;
        progress.style.width = show ? "65%" : "100%";
        if (!show) setTimeout(() => progress.style.opacity = "0", 300);
        else progress.style.opacity = "1";
      }

      function navigate(target) {
        let url = target || urlInput.value.trim();
        if (!url) return;
        if (!url.startsWith('http') && !url.includes('.')) {
           url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        } else if (!url.startsWith('http')) {
           url = 'https://' + url;
        }
        showLoader(true);
        window.top.location.href = "<?= proxyUrl ?>?url=" + encodeURIComponent(url);
      }

      async function init() {
        showLoader(true);
        const payloadStr = document.getElementById('b64-payload').textContent;
        if (!payloadStr) return;

        try {
          const cleanB64 = payloadStr.replace(/[^A-Za-z0-9+/=]/g, "");
          const response = await fetch('data:text/html;base64,' + cleanB64);
          const html = await response.text();

          if (currentBlobUrl) {
            URL.revokeObjectURL(currentBlobUrl);
          }

          const blob = new Blob([html], { type: "text/html;charset=utf-8" });
          currentBlobUrl = URL.createObjectURL(blob);
          
          viewport.onload = () => {
            showLoader(false);
            // Attempt to update tab title from iframe content if accessible
            try {
              if (viewport.contentDocument && viewport.contentDocument.title) {
                 tabTitle.textContent = viewport.contentDocument.title;
              }
            } catch(e) {}
          };
          viewport.src = currentBlobUrl;

        } catch (e) {
          showLoader(false);
          console.error("Decoding error", e);
          document.getElementById('content-area').innerHTML = 
            "<div style='padding:40px; font-family:sans-serif;'><h2>Aw, Snap!</h2><p>Something went wrong while displaying this webpage.</p><p style='color:#5f6368;font-family:monospace;'>" + e.name + ": " + e.message + "</p></div>";
        }
      }

      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'navigate') {
          let dest = e.data.url;
          if (!dest.startsWith("<?= proxyUrl ?>")) {
             dest = "<?= proxyUrl ?>?url=" + encodeURIComponent(dest);
          }
          showLoader(true);
          window.top.location.href = dest;
        }
      });

      window.onload = init;
    </script>
